<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hilbert tron — slowframe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #080808; overflow: hidden; }
#app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

#panels {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  padding: 0;
}
#panels.view-mode {
  grid-template-columns: 1fr;
}

#pDebug.hidden { display: none; }

.panel {
  position: relative;
  background: #000;
  border: none;
  border-radius: 0;
  overflow: hidden;
  min-width: 0;
}
.panel svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
.panel-label {
  position: absolute;
  top: 8px; left: 10px;
  font-size: 11px; color: #fff;
  letter-spacing: 0.18em; text-transform: lowercase;
  pointer-events: none; z-index: 10;
  font-family: 'Courier New', monospace;
}

#controls {
  flex-shrink: 0; height: 58px; background: #111;
  border-top: 1px solid #fff3; display: flex; align-items: center;
  gap: 0; padding: 0 8px; overflow-x: auto;
}
.ctrl {
  display: flex; flex-direction: column; gap: 5px;
  padding: 0 8px 0 0; min-width: 62px;
  border-right: 1px solid #fff3; margin-right: 8px; flex-shrink: 0;
}
.ctrl-label {
  font-family: 'Courier New', monospace; font-size: 11px; color: #fff;
  letter-spacing: 0.1em; display: flex; justify-content: space-between;
  align-items: baseline; white-space: nowrap;
}
.ctrl-val {
  font-family: 'Courier New', monospace; font-size: 11px; color: #fff;
  min-width: 36px; text-align: right;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
  background: #fff4; border-radius: 3px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: #fff; cursor: pointer;
  box-shadow: 0 0 0 2px #111, 0 1px 4px #0006;
}
input[type=range]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; border: 2px solid #111; cursor: pointer;
}
input[type=color] {
  width: 100%; height: 22px; border: 1px solid #fff4; border-radius: 2px;
  background: none; cursor: pointer; padding: 1px 2px;
}
.btn-group {
  display: flex; flex-direction: row; gap: 4px;
  padding: 0 10px 0 0; border-right: 1px solid #fff3;
  margin-right: 10px; flex-shrink: 0; align-items: center;
}
button {
  padding: 4px 8px; font-size: 11px; font-family: 'Courier New', monospace;
  cursor: pointer; border: 1px solid #fff4; border-radius: 2px;
  background: none; color: #fff; letter-spacing: 0.1em;
  transition: border-color 0.1s, color 0.1s, background 0.1s; white-space: nowrap;
}
button:hover { border-color: #fff; color: #fff; background: #ffffff12; }
button.active { border-color: #fff; color: #fff; background: #ffffff1e; }
</style>
</head>
<body>
<div id="app">
  <div id="panels">
    <div class="panel" id="pDebug">
      <div class="panel-label">hilbert path</div>
      <svg id="svgDebug" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="panel" id="pDepth">
      <div class="panel-label">depth stack</div>
      <svg id="svgDepth" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div id="controls">
    <div class="ctrl" style="min-width:44px;">
      <div class="ctrl-label">color 1</div>
      <input type="color" id="wallColor" value="#00ffcc">
    </div>
    <div class="ctrl" style="min-width:44px;">
      <div class="ctrl-label">color 2</div>
      <input type="color" id="wallColor2" value="#00ffcc">
    </div>
    <div class="ctrl" style="min-width:44px;">
      <div class="ctrl-label">color 3</div>
      <input type="color" id="wallColor3" value="#00ffcc">
    </div>
    <div class="ctrl">
      <div class="ctrl-label">order <span class="ctrl-val" id="goV">4</span></div>
      <input type="range" id="orderR" min="2" max="7" step="1" value="4">
    </div>
    <div class="ctrl">
      <div class="ctrl-label">thick <span class="ctrl-val" id="thV">1.5</span></div>
      <input type="range" id="thickR" min="0.3" max="6.0" step="0.1" value="1.5">
    </div>
    <div class="ctrl">
      <div class="ctrl-label">layers <span class="ctrl-val" id="lyV">18</span></div>
      <input type="range" id="layersR" min="14" max="76" step="1" value="30">
    </div>
    <div class="ctrl">
      <div class="ctrl-label">depth <span class="ctrl-val" id="dpV">0.820</span></div>
      <input type="range" id="depthR" min="0" max="100" step="1" value="68">
    </div>
    <div class="ctrl">
      <div class="ctrl-label">dim <span class="ctrl-val" id="mbV">50%</span></div>
      <input type="range" id="dimR" min="0" max="100" step="1" value="50">
    </div>
    <div class="ctrl">
      <div class="ctrl-label">rotation <span class="ctrl-val" id="rtV">0°</span></div>
      <input type="range" id="rotR" min="-180" max="180" step="1" value="0">
    </div>
    <div class="ctrl">
      <div class="ctrl-label">speed <span class="ctrl-val" id="spV">0.40</span></div>
      <input type="range" id="speedR" min="0" max="100" step="1" value="40">
    </div>
    <div class="btn-group">
      <button id="pauseBtn">pause</button>
      <button id="resetBtn">reset</button>
      <button id="viewBtn">debug</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// HILBERT WORMHOLE
//
// Each slot has a continuous position: pos = slot - phase
// Scale: d = Math.pow(depth, pos - EXTRA_FRONT)
//   pos = EXTRA_FRONT → d = 1 (fits canvas), pos < EXTRA_FRONT → oversized
// Phase advances each frame and wraps at 1.0 — seamless because the
// slot distribution at phase=1 is identical to phase=0 shifted by one.
// t = pos / (total-1) anchors all tweens to apparent visual depth.
// ═══════════════════════════════════════════════════════════════════

// ─── Hilbert ────────────────────────────────────────────────────────
function d2xy(n, d) {
  let rx, ry, s, t=d, x=0, y=0;
  for (s=1; s<n; s*=2) {
    rx=1&(t>>1); ry=1&(t^rx);
    if (ry===0) { if (rx===1) { x=s-1-x; y=s-1-y; } let tmp=x; x=y; y=tmp; }
    x+=s*rx; y+=s*ry; t>>=2;
  }
  return [x, y];
}

function baseHilbert(order) {
  const N = 1 << order, total = N * N;
  const path = new Array(total);
  for (let d = 0; d < total; d++) path[d] = d2xy(N, d);
  return { path, N };
}

// ─── Build tiled path for a given panel rect ─────────────────────────
function buildTiledPath(order, W, H, margin) {
  const { path, N } = baseHilbert(order);
  const shortAxis   = Math.min(W, H);
  const longAxis    = Math.max(W, H);
  const isLandscape = W >= H;

  const usableShort = shortAxis * (1 - 2 * margin);
  const usableLong  = longAxis  * (1 - 2 * margin);
  const cellPxInit  = usableShort / N;
  const tilesNeeded = Math.max(1, Math.round(usableLong / (N * cellPxInit)));

  const cellFromShort = usableShort / N;
  const cellFromLong  = usableLong  / (tilesNeeded * N);
  const cellPx = Math.min(cellFromShort, cellFromLong);

  const gridShort = N * cellPx;
  const gridLong  = tilesNeeded * N * cellPx;
  const gridW = isLandscape ? gridLong  : gridShort;
  const gridH = isLandscape ? gridShort : gridLong;
  const ox = -gridW / 2;
  const oy = -gridH / 2;

  const pts = [];
  for (let ti = 0; ti < tilesNeeded; ti++) {
    for (let d = 0; d < path.length; d++) {
      let [gx, gy] = path[d];

      if (isLandscape) {
        const px = ox + ti * N * cellPx + (gx + 0.5) * cellPx;
        const py = oy + gridH - (gy + 0.5) * cellPx;
        pts.push([px, py]);
      } else {
        const rgx = N - 1 - gy;
        const rgy = gx;
        const px = ox + (rgx + 0.5) * cellPx;
        const py = oy + gridH - (ti * N * cellPx) - (rgy + 0.5) * cellPx;
        pts.push([px, py]);
      }
    }
  }
  return { pts, cellPx, tilesNeeded, N };
}

function ptsToStr(pts) {
  return pts.map(([x, y]) => `${x.toFixed(3)},${y.toFixed(3)}`).join(' ');
}

// ─── Params ─────────────────────────────────────────────────────────
const getColor     = () => document.getElementById('wallColor').value;
const getColor2    = () => document.getElementById('wallColor2').value;
const getColor3    = () => document.getElementById('wallColor3').value;
const getOrder     = () => parseInt(document.getElementById('orderR').value);
const getThick     = () => parseFloat(document.getElementById('thickR').value);
const getTotalLayers = () => parseInt(document.getElementById('layersR').value);
const getDepth     = () => {
  const t = parseFloat(document.getElementById('depthR').value) / 100;
  return 1 - 0.5 * Math.pow(1 - t, 2);
};
const getMinBright = () => parseFloat(document.getElementById('dimR').value) / 100;
const getRot       = () => parseFloat(document.getElementById('rotR').value);
const getSpeed     = () => {
  // map 0-100 slider to 0–2.0 layers/sec, with a gentle curve
  const t = parseFloat(document.getElementById('speedR').value) / 100;
  return t * t * 2.0;
};

function hexToRGB(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#' +
    Math.round(r).toString(16).padStart(2,'0') +
    Math.round(g).toString(16).padStart(2,'0') +
    Math.round(b).toString(16).padStart(2,'0');
}

// ─── State ──────────────────────────────────────────────────────────
let debugPtsStr = null;
let depthPtsStr = null;
let viewMode    = true;
let phase       = 0;       // 0→1 animation offset, wraps
let paused      = false;
let lastTime    = null;
// ─── Init ────────────────────────────────────────────────────────────
function init() {
  const order  = getOrder();
  const margin = 0.04;

  const pDebug = document.getElementById('pDebug');
  if (!viewMode) {
    const { pts: dpts } = buildTiledPath(order, pDebug.clientWidth, pDebug.clientHeight, margin);
    debugPtsStr = ptsToStr(dpts);
  }

  const pDepth = document.getElementById('pDepth');
  const { pts: rpts } = buildTiledPath(order, pDepth.clientWidth, pDepth.clientHeight, margin);
  depthPtsStr = ptsToStr(rpts);

  renderDebug();
  // depth is driven by the animation loop — no direct renderDepth() call needed
}

// ─── Render debug panel ───────────────────────────────────────────────
function renderDebug() {
  if (viewMode) return;
  const svg   = document.getElementById('svgDebug');
  const panel = document.getElementById('pDebug');
  const W = panel.clientWidth, H = panel.clientHeight;

  svg.setAttribute('viewBox', `${-W/2} ${-H/2} ${W} ${H}`);
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (!debugPtsStr) return;

  const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  pl.setAttribute('points', debugPtsStr);
  pl.setAttribute('fill', 'none');
  pl.setAttribute('stroke', getColor());
  pl.setAttribute('stroke-width', getThick().toFixed(2));
  pl.setAttribute('stroke-linecap', 'square');
  pl.setAttribute('stroke-linejoin', 'miter');
  pl.setAttribute('stroke-miterlimit', '10');
  svg.appendChild(pl);
}

// ─── Render depth panel — phase-animated ─────────────────────────────
function renderDepth() {
  const svg   = document.getElementById('svgDepth');
  const panel = document.getElementById('pDepth');
  const W = panel.clientWidth, H = panel.clientHeight;

  svg.setAttribute('viewBox', `${-W/2} ${-H/2} ${W} ${H}`);
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (!depthPtsStr) return;

  const EXTRA_FRONT = 12;
  const FADE_SLOTS  = 4;
  const total       = getTotalLayers();
  const depth       = getDepth();
  const thick       = getThick();
  const rotMax      = getRot();
  const minBright   = getMinBright();
  const [c1r,c1g,c1b] = hexToRGB(getColor());
  const [c2r,c2g,c2b] = hexToRGB(getColor2());
  const [c3r,c3g,c3b] = hexToRGB(getColor3());

  for (let slot = total - 1; slot >= 0; slot--) {
    // pos: continuous position in the slot array, accounting for animation phase.
    // slot 0 = most oversized (front mouth), slot total-1 = deepest back layer.
    // EXTRA_FRONT is the scale origin — pos=EXTRA_FRONT means d=1 (fits canvas exactly).
    const pos = slot - phase;
    const d   = Math.pow(depth, pos - EXTRA_FRONT);

    if (d < 0.003) continue;

    // t: visual depth position [0, 1] across the full slot range.
    // Anchored to pos (apparent depth), not slot index, so colors stay
    // locked to visual depth as phase advances.
    // t=0 → slot 0 (mouth, color1), t=0.5 → midpoint (color2), t=1 → back (color3)
    const t = pos / (total - 1);

    // Front fade: ramp in over FADE_SLOTS from the mouth
    const frontOpacity = Math.min(1, pos / FADE_SLOTS);
    // Back-exit fade: ramp out over the last slot
    const exitFade = Math.min(1, Math.max(0, total - 1 - pos));
    const edgeFade = Math.min(frontOpacity, exitFade);

    // All tweens use t — smooth, no jumps, anchored to visual depth
    const rot        = rotMax * t;
    const brightness = Math.min(1, Math.max(minBright, 1.0 - (1.0 - minBright) * t));

    // Two-segment color lerp across all slots (overshoot + visible stack).
    // color1 at t=0 (mouth), color2 at t=0.5 (midpoint of total), color3 at t=1 (back).
    let lr, lg, lb;
    if (t < 0.5) {
      const s = t * 2;
      lr = c1r + (c2r - c1r) * s;
      lg = c1g + (c2g - c1g) * s;
      lb = c1b + (c2b - c1b) * s;
    } else {
      const s = (t - 0.5) * 2;
      lr = c2r + (c3r - c2r) * s;
      lg = c2g + (c3g - c2g) * s;
      lb = c2b + (c3b - c2b) * s;
    }
    const col = rgbToHex(
      Math.min(255, Math.max(0, lr)) * brightness,
      Math.min(255, Math.max(0, lg)) * brightness,
      Math.min(255, Math.max(0, lb)) * brightness
    );
    const strokeW = thick / d;
    // Edge transitions use alpha so color stays true at both ends
    const opacity = edgeFade.toFixed(4);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `scale(${d.toFixed(6)}) rotate(${rot.toFixed(3)})`);
    g.setAttribute('opacity', opacity);

    const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    pl.setAttribute('points', depthPtsStr);
    pl.setAttribute('fill', 'none');
    pl.setAttribute('stroke', col);
    pl.setAttribute('stroke-width', strokeW.toFixed(4));
    pl.setAttribute('stroke-linecap', 'square');
    pl.setAttribute('stroke-linejoin', 'miter');
    pl.setAttribute('stroke-miterlimit', '10');

    g.appendChild(pl);
    svg.appendChild(g);
  }
}

// ─── Animation loop ───────────────────────────────────────────────────
function tick(ts) {
  requestAnimationFrame(tick);

  if (lastTime === null) { lastTime = ts; }
  const dt = Math.min((ts - lastTime) / 1000, 0.1); // seconds, clamped
  lastTime = ts;

  if (!paused) {
    phase += getSpeed() * dt;
    if (phase >= 1) phase -= Math.floor(phase); // wrap fractionally
  }

  renderDepth();
  if (!viewMode) renderDebug();
}

// ─── View mode toggle ─────────────────────────────────────────────────
document.getElementById('viewBtn').onclick = function() {
  viewMode = !viewMode;
  this.textContent = viewMode ? 'debug' : 'view';
  const panels = document.getElementById('panels');
  const pDebug = document.getElementById('pDebug');
  if (viewMode) {
    pDebug.classList.add('hidden');
    panels.classList.add('view-mode');
  } else {
    pDebug.classList.remove('hidden');
    panels.classList.remove('view-mode');
  }
  requestAnimationFrame(() => requestAnimationFrame(() => init()));
};

// ─── Pause/play ──────────────────────────────────────────────────────
document.getElementById('pauseBtn').onclick = function() {
  paused = !paused;
  this.textContent = paused ? 'play' : 'pause';
  if (!paused) lastTime = null; // reset dt to avoid jump on resume
};

// ─── Resize ──────────────────────────────────────────────────────────
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => init(), 150);
});

// ─── Controls ────────────────────────────────────────────────────────
function bindSlider(id, valId, fmt, rebuild) {
  document.getElementById(id).addEventListener('input', e => {
    document.getElementById(valId).textContent = fmt(e.target.value);
    if (rebuild) init();
    // renderDepth is handled by animation loop; no explicit call needed
  });
}

bindSlider('orderR',  'goV', v => v,                                                true);
bindSlider('thickR',  'thV', v => parseFloat(v).toFixed(1),                         false);
bindSlider('layersR', 'lyV', v => v,                                                false);
bindSlider('depthR',  'dpV', v => {
  const t = parseFloat(v) / 100;
  return (1 - 0.5 * Math.pow(1-t,2)).toFixed(3);
},                                                                                   false);
bindSlider('dimR',    'mbV', v => `${parseInt(v)}%`,                                false);
bindSlider('rotR',    'rtV', v => `${parseInt(v) >= 0 ? '+' : ''}${parseInt(v)}°`,  false);
bindSlider('speedR',  'spV', v => {
  const t = parseFloat(v) / 100;
  return (t * t * 2.0).toFixed(2);
},                                                                                   false);

// color inputs handled by animation loop — no explicit listeners needed
document.getElementById('resetBtn').onclick = () => { phase = 0; init(); };

// ─── Boot ────────────────────────────────────────────────────────────
document.getElementById('pDebug').classList.add('hidden');
document.getElementById('panels').classList.add('view-mode');
init();
requestAnimationFrame(tick);
</script>
</body>
</html>
